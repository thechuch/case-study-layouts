<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Circle — Case Study Layouts</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap');
  html{overflow-x:hidden}
  body{background:#fff;color:#1a1a1a;font-family:'Public Sans',-apple-system,'Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .sans{font-family:'Public Sans',-apple-system,'Helvetica Neue',sans-serif}

  /* Nav */
  .nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid #e8e8e8}
  .nav-inner{display:flex;align-items:center;max-width:1100px;margin:0 auto;padding:0 20px;overflow-x:auto;scrollbar-width:none}
  .nav-inner::-webkit-scrollbar{display:none}
  .nav-label{font-size:10px;letter-spacing:3px;color:#999;margin-right:16px;white-space:nowrap;padding:14px 0;flex-shrink:0;font-weight:600}
  .nav-div{height:20px;width:1px;background:#ddd;margin-right:12px;flex-shrink:0}
  .nav-btn{padding:14px 12px;border:none;cursor:pointer;white-space:nowrap;background:transparent;color:#999;font-size:11px;font-weight:600;letter-spacing:1px;transition:color .3s;border-bottom:2px solid transparent;font-family:inherit;flex-shrink:0;text-transform:uppercase}
  .nav-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
  .nav-btn:hover{color:#555}

  /* Wrap */
  .wrap{max-width:1100px;margin:0 auto;padding-bottom:80px}

  /* Full-bleed — breaks out of .wrap to fill viewport */
  .bleed{width:100vw;margin-left:calc(50% - 50vw)}

  /* Fade */
  .fade{opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease}
  .fade.visible{opacity:1;transform:translateY(0)}

  /* Masthead */
  .masthead{position:relative;width:100%;overflow:hidden}
  .masthead img{width:100%;display:block;min-height:300px;object-fit:cover}
  .masthead-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,rgba(0,0,0,.1) 50%,transparent 100%)}
  .masthead-content{position:absolute;bottom:48px;left:48px;right:48px;color:#fff}
  .masthead h1{font-size:clamp(32px,6vw,56px);font-weight:700;line-height:1.1;margin-bottom:8px}
  .masthead .sub{font-size:clamp(14px,2vw,18px);font-weight:400;opacity:.85;letter-spacing:.5px}

  /* Article content */
  .article{max-width:720px;margin:0 auto;padding:0 24px}
  .article-wide{max-width:960px;margin:0 auto;padding:0 24px}
  .article-full{width:100%;padding:0}

  /* Meta bar */
  .meta-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;padding:32px 0;border-bottom:1px solid #e0e0e0;margin-bottom:40px}
  .client-logo{display:flex;align-items:center;gap:10px}
  .client-circle{width:36px;height:36px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center}
  .client-circle span{color:#fff;font-size:11px;font-weight:700;font-family:-apple-system,sans-serif;letter-spacing:1px}
  .client-name{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
  .meta-info{display:flex;gap:20px;font-size:10px;letter-spacing:2px;color:#999;text-transform:uppercase;font-weight:500;flex-wrap:wrap}

  /* Pills */
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin:20px 0 0}
  .pill{padding:6px 16px;border-radius:50px;border:1px solid #ddd;font-size:11px;font-weight:500;color:#888;letter-spacing:1px;white-space:nowrap;text-transform:uppercase}

  /* Typography */
  .h-section{font-size:clamp(11px,1.2vw,12px);font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#999;margin:56px 0 20px}
  .h-article{font-size:clamp(22px,3vw,32px);font-weight:700;line-height:1.25;margin:0 0 24px;color:#1a1a1a}
  p{font-size:clamp(14px,1.6vw,16px);line-height:1.85;color:#666;margin-bottom:24px;font-weight:400}
  .lead{font-size:clamp(16px,2vw,19px);line-height:1.75;color:#444;margin-bottom:32px;font-weight:400}
  .caption{font-size:11px;color:#999;margin-top:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
  .caption-title{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:4px}

  /* Media */
  .img-full{width:100%;display:block;margin:48px 0}
  .img-full img{width:100%;display:block}
  .img-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0}
  .img-pair img{width:100%;display:block;border-radius:0}

  /* Text + Image side by side */
  .text-media{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;margin:56px 0;padding:0 24px;max-width:960px;margin-left:auto;margin-right:auto}
  .text-media.reverse{direction:rtl}
  .text-media.reverse>*{direction:ltr}
  .text-media img{width:100%;display:block;border-radius:4px}
  .text-media .tm-text .h-section{margin-top:0}

  /* Divider */
  .divider{height:1px;background:#e0e0e0;margin:56px 0}

  /* Footer nav */
  .foot{display:flex;justify-content:space-between;align-items:center;padding:48px 24px 0;margin-top:48px;max-width:960px;margin-left:auto;margin-right:auto;gap:16px}
  .foot-rule{flex:1;height:1px;background:#e0e0e0;margin-right:24px}
  .foot-btns{display:flex;gap:8px;flex-shrink:0}
  .foot-btn{padding:10px 24px;border-radius:4px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;font-size:11px;letter-spacing:1px;font-family:inherit;text-transform:uppercase;transition:all .2s;font-weight:600}
  .foot-btn:hover{border-color:#999;color:#1a1a1a}
  .foot-btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .foot-btn.primary:hover{background:#333}

  /* Recap */
  .recap-header{text-align:center;padding:56px 24px 16px}
  .recap-item{margin-bottom:64px;padding-bottom:64px;border-bottom:1px solid #e8e8e8}

  /* ═══════════════════════════════════════════
     NEW STYLES — Refined Layouts v2
     ═══════════════════════════════════════════ */

  /* Portrait pair grid */
  .img-pair-portrait{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0}
  .img-pair-portrait img{width:100%;display:block;border-radius:0;aspect-ratio:3/4;object-fit:cover}

  /* Triple grid */
  .img-triple{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0}
  .img-triple img{width:100%;display:block;border-radius:0}

  /* Asymmetric grids */
  .img-asym{display:grid;grid-template-columns:1.6fr 1fr;gap:8px;margin:0;align-items:stretch}
  .img-asym img{width:100%;height:100%;display:block;border-radius:0;object-fit:cover}
  .img-asym-rev{display:grid;grid-template-columns:1fr 1.6fr;gap:8px;margin:0;align-items:stretch}
  .img-asym-rev img{width:100%;height:100%;display:block;border-radius:0;object-fit:cover}

  /* Video placeholder */
  .video-placeholder{position:relative;border-radius:0;overflow:hidden;margin:0}
  .video-placeholder img{width:100%;display:block}
  .video-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.95);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,0.15);transition:transform .2s}
  .video-play:hover{transform:translate(-50%,-50%) scale(1.08)}
  .video-play::after{content:'';display:block;width:0;height:0;border-left:20px solid #1a1a1a;border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:4px}

  /* Section label (small uppercase heading above image groups) */
  .section-label{font-size:10px;font-weight:700;letter-spacing:4px;color:#bbb;text-transform:uppercase;margin-bottom:16px}

  /* Read more toggle */
  .read-more-toggle{background:none;border:none;cursor:pointer;font-size:12px;letter-spacing:1.5px;color:#999;font-family:inherit;padding:8px 0;transition:color .3s;font-weight:600;text-transform:uppercase}
  .read-more-toggle:hover{color:#555}
  .read-more-content{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.25,.1,.25,1)}
  .read-more-content.open{max-height:500px}

  /* GIF badge */
  .gif-badge{position:absolute;top:12px;right:12px;padding:4px 12px;border-radius:4px;background:rgba(0,0,0,0.06);font-size:10px;letter-spacing:2px;color:#999;font-weight:600}

  /* Interstitial pull-quote (inline) */
  .interstitial-quote{font-size:clamp(20px,3.5vw,28px);font-weight:400;color:#1a1a1a;line-height:1.5;max-width:640px;margin:56px 0;font-style:italic}

  /* ── Layout 2: Narrative Arc ── */

  /* Narrative chapter heading */
  .narr-heading{font-size:clamp(11px,1.2vw,12px);font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#bbb;padding-bottom:12px;border-bottom:1px solid #e8e8e8;margin-bottom:20px;margin-top:56px}
  .chapter-num{display:inline-block;font-size:10px;letter-spacing:3px;color:#ccc;margin-right:12px;font-weight:600}

  /* Expandable accordion */
  .expand-section{border-bottom:1px solid #e8e8e8;padding:20px 0}
  .expand-toggle{display:flex;justify-content:space-between;align-items:center;width:100%;background:none;border:none;cursor:pointer;font-family:inherit;color:#444;font-size:clamp(15px,2vw,18px);font-weight:500;padding:0;text-align:left;transition:color .3s}
  .expand-toggle:hover{color:#1a1a1a}
  .expand-icon{font-size:20px;color:#ccc;transition:transform .3s;flex-shrink:0;margin-left:16px;font-weight:300}
  .expand-toggle.open .expand-icon{transform:rotate(45deg)}
  .expand-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.25,.1,.25,1)}
  .expand-body.open{max-height:600px}

  /* Hero metadata grid */
  .hero-meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:24px;padding:32px 0;border-bottom:1px solid #e8e8e8}
  .hero-meta-item{font-size:11px;letter-spacing:2px;text-transform:uppercase}
  .hero-meta-item .label{color:#bbb;margin-bottom:6px;font-weight:600}
  .hero-meta-item .value{color:#666;font-weight:500}

  /* ── Layout 3: Editorial ── */

  /* Giant editorial title */
  .ed-giant-title{font-size:clamp(42px,10vw,80px);font-weight:700;color:#1a1a1a;letter-spacing:-3px;line-height:0.95;max-width:700px}
  .ed-subtitle{font-size:clamp(15px,2vw,19px);font-weight:400;color:#888;line-height:1.7;max-width:560px;margin-top:24px}

  /* Pull-quote callout */
  .pullquote-block{border-left:3px solid #1a1a1a;padding:40px 0 40px 32px;margin:56px 0}
  .pullquote-text{font-size:clamp(20px,3.5vw,32px);font-weight:400;color:#1a1a1a;line-height:1.4;letter-spacing:-0.5px;max-width:600px}
  .pullquote-attr{font-size:11px;letter-spacing:3px;color:#bbb;text-transform:uppercase;margin-top:20px;font-weight:600}

  /* Results/stats block */
  .results-block{background:#f8f8f8;border-radius:8px;padding:48px;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:32px;margin:56px 0}
  .result-num{font-size:clamp(32px,5vw,48px);font-weight:700;color:#1a1a1a;letter-spacing:-1px}
  .result-label{font-size:11px;letter-spacing:2px;color:#999;text-transform:uppercase;margin-top:8px;font-weight:500}

  /* 2-column body copy */
  .ed-body-copy{columns:2;column-gap:40px;font-size:clamp(14px,1.6vw,16px);line-height:1.85;color:#666;font-weight:400}

  /* Related projects grid */
  .related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:24px}
  .related-card{border-radius:6px;overflow:hidden;cursor:pointer;transition:transform .3s}
  .related-card:hover{transform:translateY(-4px)}
  .related-card img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:4px}
  .related-card-info{padding:16px 0}
  .related-card-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
  .related-card-type{font-size:10px;letter-spacing:2px;color:#999;text-transform:uppercase;font-weight:500}

  /* Responsive video — desktop horizontal / mobile vertical */
  .responsive-video{position:relative;width:100%;background:#111}
  .responsive-video video{width:100%;display:block}
  .vid-mobile{display:none}

  /* ═══════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════ */
  @media(max-width:768px){
    .nav-label{display:none}
    .nav-div{display:none}
    .nav-btn{padding:12px 8px;font-size:10px}
    .masthead-content{bottom:24px;left:24px;right:24px}
    .text-media{grid-template-columns:1fr;gap:24px}
    .text-media.reverse{direction:ltr}
    .img-pair{grid-template-columns:1fr}
    .img-pair-portrait{grid-template-columns:1fr}
    .img-pair-portrait img{aspect-ratio:auto}
    .img-triple{grid-template-columns:1fr}
    .img-asym{grid-template-columns:1fr}
    .img-asym-rev{grid-template-columns:1fr}
    .meta-bar{flex-direction:column;align-items:flex-start}
    .foot{flex-direction:column;align-items:stretch}
    .foot-rule{display:none}
    .foot-btns{justify-content:space-between;width:100%}
    .split-hero-grid{grid-template-columns:1fr !important;min-height:auto !important}
    .split-hero-grid>div:last-child img{min-height:300px}
    .related-grid{grid-template-columns:1fr}
    .ed-body-copy{columns:1}
    .pullquote-block{padding-left:20px}
    .results-block{padding:28px}
    .ed-giant-title{letter-spacing:-1px}
    .vid-desktop{display:none !important}
    .vid-mobile{display:block !important}
  }
  @media(max-width:480px){
    .masthead h1{font-size:28px}
    .pills{gap:4px}
    .pill{padding:4px 10px;font-size:10px}
    .related-grid{gap:12px}
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-label">CASE STUDY</div>
    <div class="nav-div"></div>
    <button class="nav-btn active" onclick="go(0)">Visual Mosaic</button>
    <button class="nav-btn" onclick="go(1)">Narrative Arc</button>
    <button class="nav-btn" onclick="go(2)">Editorial</button>
    <button class="nav-btn" onclick="go(3)">Recap</button>
  </div>
</nav>

<div class="wrap" id="wrap"></div>

<script>
const BRAND="GRASSROOTS";
const TAG="Field Notes";
const SUB="An art gallery meets connoisseur tasting — a first-of-its-kind trade event redefining cannabis brand activation in Illinois.";
const SVCS=["Event Design","Brand Activation","Experiential Marketing","Art Direction","Environmental Design","Content Production","Motion Design"];

// ── Copy blocks ──
const COPY_LEAD="Field Notes was a first-of-its-kind trade event for Grassroots, Curaleaf\u2019s premium cannabis flower brand \u2014 designed to immerse Illinois budtenders in the craft, quality, and culture behind the product they recommend every day.";
const COPY_DETAIL="Cannabis trade events had become predictable \u2014 booths, swag, and product demos that all blurred together. Grassroots needed something that would cut through the noise and create a genuine connection between the people growing the flower and the people selling it.";
const COPY_STRATEGY="We developed the Field Notes concept around the idea that appreciating cannabis is no different from appreciating fine wine or craft spirits. The format borrowed from connoisseur culture \u2014 guided tastings, curated environments, and direct access to the master grower \u2014 while the aesthetic drew from the contemporary art world. Every detail was designed to elevate the perception of what a cannabis trade event could be.";
const COPY_IDENTITY="The Field Notes visual identity walked a careful line \u2014 elevated and gallery-worthy without losing the raw, earthy authenticity of the Grassroots brand. We developed a design language rooted in macro photography, tactile textures, and restrained typography that let the product be the hero.";
const COPY_GALLERY="The gallery installation transformed the event space into an immersive brand experience. High-resolution macro photography of Grassroots flower was printed at large scale and arranged like fine art \u2014 giving budtenders an entirely new perspective on the product they sell daily.";
const COPY_TASTING="The centerpiece of Field Notes was the guided group tasting \u2014 small groups of budtenders, outfitted in branded lab coats, sampling pre-loaded glass chillums under the guidance of the Grassroots master grower. Each strain was presented with tasting notes and growing context, turning a product demo into a sensory experience.";
const COPY_APPROACH="Our approach was rooted in a simple insight: budtenders are the most influential touchpoint in cannabis retail, yet brands rarely invest in creating meaningful experiences for them. Field Notes was designed to change that \u2014 to make budtenders feel like insiders, not just salespeople. Every element, from the DJ and food program to the custom lab coats, reinforced that this was something different.";
const COPY_RESULTS="Field Notes exceeded every benchmark. Attendee feedback was overwhelmingly positive, with budtenders reporting deeper understanding and genuine appreciation of the Grassroots brand. More significantly, the look and feel developed for Field Notes ended up informing much of the evolution of the Grassroots brand identity itself \u2014 and the event format was greenlit for replication across the country.";
const PULL_QUOTE="We wanted budtenders to walk away feeling like insiders \u2014 not like they\u2019d just been to another trade event.";
const COPY_EXTENDED="Small Circle partnered with Curaleaf to conceive, design, and produce Field Notes \u2014 a trade event format for Grassroots that reimagined what brand activation looks like in the cannabis industry. Drawing from the worlds of fine art and connoisseur culture, we created an experience that paired macro photography galleries with guided flower tastings led by the master grower. Attendees donned branded lab coats and moved through curated stations \u2014 tasting pre-loaded chillums, studying large-format botanical photography, and engaging directly with the cultivators. The event was backed by a full sensory program including a DJ set, a curated food and drinks program, and environmental design that transformed a standard venue into something extraordinary. What started as a single Illinois activation became a blueprint \u2014 the format, visual language, and brand positioning developed for Field Notes went on to shape the broader evolution of the Grassroots brand nationwide.";

function mkImg(w,h,hue,sat,lit,label){
  const c=document.createElement("canvas");c.width=w;c.height=h;
  const x=c.getContext("2d");
  const g=x.createLinearGradient(0,0,w,h);
  g.addColorStop(0,`hsl(${hue},${sat}%,${lit}%)`);
  g.addColorStop(1,`hsl(${hue+25},${sat+5}%,${lit+5}%)`);
  x.fillStyle=g;x.fillRect(0,0,w,h);
  if(label){x.fillStyle="rgba(255,255,255,0.06)";x.font=`600 ${Math.min(w,h)/4}px -apple-system,sans-serif`;x.textAlign="center";x.textBaseline="middle";x.fillText(label,w/2,h/2)}
  return c.toDataURL();
}

const I={};
function initImgs(){
  // Real Field Notes event assets
  I.art1="Artboard%201.png";       // "MADE WITH PASSION" starburst (landscape)
  I.art2="Artboard%202.png";       // "horticulturist meets mad scientist" (landscape)
  I.poster1="Poster%201.png";      // Grower quote poster (portrait)
  I.poster2="Poster%202.png";      // Cultivars poster (portrait)
  I.s1="strain%201.png";           // Ray Charles tasting card (portrait)
  I.s2="strain%202.png";           // Jordanz tasting card (portrait)
  I.s3="strain%203.png";           // Titan Express tasting card (portrait)
  // Layout slot assignments (real assets + placeholders for missing event photos)
  I.hero=I.art1;
  I.a=I.art2;
  I.b=I.art1;
  I.c=mkImg(800,600,90,12,20,"ATMOSPHERE");
  I.d=mkImg(800,500,45,14,24,"LAB COATS");
  I.e=I.art2;
  I.f=I.poster1;
  I.g=mkImg(900,500,100,14,22,"DJ + FOOD");
  I.h=I.poster2;
  I.vid=mkImg(1400,788,140,16,20,"VIDEO");
  I.gif=mkImg(700,700,30,12,24,"BTS");
  I.rel1=mkImg(600,450,145,14,22,"REL-A");
  I.rel2=mkImg(600,450,40,16,28,"REL-B");
  I.rel3=mkImg(600,450,110,10,20,"REL-C");
}
initImgs();

const logo=()=>`<div class="client-logo"><div class="client-circle"><span style="font-size:9px">GR</span></div><span class="client-name">${BRAND}</span></div>`;
const pills=()=>`<div class="pills">${SVCS.map(s=>`<span class="pill">${s}</span>`).join("")}</div>`;
const metaInfo=()=>`<div class="meta-info"><span>2025</span><span>Illinois</span><span>Trade Event</span></div>`;
const img=(src,s="")=>`<img src="${src}" style="${s}">`;
const fade=(html,d=0)=>`<div class="fade" style="transition-delay:${d}s">${html}</div>`;

const responsiveVideo=()=>`<div class="responsive-video">
  <video class="vid-desktop" autoplay muted loop playsinline poster="poster-horizontal.jpg">
    <source src="field-notes-horizontal.mp4" type="video/mp4">
  </video>
  <video class="vid-mobile" autoplay muted loop playsinline poster="poster-vertical.jpg">
    <source src="field-notes-vertical.mp4" type="video/mp4">
  </video>
</div>`;

function sh(num,title){
  return `<div style="text-align:center;padding:48px 24px 32px">
    <div class="sans" style="font-size:10px;letter-spacing:5px;color:#bbb;margin-bottom:10px">LAYOUT ${num}</div>
    <div style="font-size:22px;font-weight:400;color:#1a1a1a;letter-spacing:1px">${title}</div>
  </div>`;
}

// Shared content helpers
const masthead=(style="")=>`<div class="masthead" style="${style}">
  ${img(I.hero,"min-height:400px")}
  <div class="masthead-overlay"></div>
  <div class="masthead-content">
    <div class="sub sans">${BRAND}</div>
    <h1>${TAG}</h1>
    <div class="sub">${SUB}</div>
  </div>
</div>`;

const metaBar=()=>`<div class="article"><div class="meta-bar">${logo()}${metaInfo()}</div>${pills()}</div>`;

const galleryFull=(src)=>`<div class="img-full">${fade(img(src))}</div>`;

function expandToggle(title, content) {
  return `<div class="expand-section">
    <button class="expand-toggle" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open')">
      <span>${title}</span>
      <span class="expand-icon">+</span>
    </button>
    <div class="expand-body">
      <div style="padding:16px 0 8px">${content}</div>
    </div>
  </div>`;
}

function narrHeading(num, title) {
  return `<div class="narr-heading"><span class="chapter-num">${num}</span>${title}</div>`;
}

// ══════════════════════════════════════════════════
// NAV, RENDER, NAVIGATION
// ══════════════════════════════════════════════════
const layoutFns=[L1,L2,L3];
let current=0;

function footNav(idx){
  let h=`<div class="foot"><div class="foot-rule"></div><div class="foot-btns">`;
  if(idx>0)h+=`<button class="foot-btn" onclick="go(${idx-1})">\u2190 PREV</button>`;
  if(idx<2)h+=`<button class="foot-btn primary" onclick="go(${idx+1})">NEXT \u2192</button>`;
  else h+=`<button class="foot-btn primary" onclick="go(3)">RECAP \u2192</button>`;
  h+=`</div></div>`;
  return h;
}

function render(){
  const wrap=document.getElementById("wrap");
  if(current<3){
    wrap.innerHTML=`<div>${layoutFns[current]()}${footNav(current)}</div>`;
  } else {
    let h=`<div class="recap-header">
      <div class="sans" style="font-size:10px;letter-spacing:5px;color:#bbb;margin-bottom:10px">COMPARE</div>
      <div style="font-size:22px;font-weight:400;color:#1a1a1a;letter-spacing:1px">All Layouts</div>
      <p class="sans" style="font-size:13px;color:#999;margin-top:8px">Scroll to compare all three approaches.</p>
    </div>`;
    layoutFns.forEach(fn=>{h+=`<div class="recap-item">${fn()}</div>`});
    wrap.innerHTML=h;
  }
  document.querySelectorAll(".nav-btn").forEach((btn,i)=>{btn.classList.toggle("active",i===current)});
  setTimeout(()=>{
    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");obs.unobserve(e.target)}})},{threshold:0.08});
    document.querySelectorAll(".fade").forEach(el=>obs.observe(el));
  },50);
}

function go(idx){
  current=idx;
  window.scrollTo({top:0,behavior:"smooth"});
  setTimeout(render,150);
}

render();
</script>
