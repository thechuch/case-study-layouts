image: node:20-alpine

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html public/index.html
  artifacts:
    paths:
      - public
  only:
    - main

# Netlify deploy (runs on every push to main)
deploy_netlify:
  stage: deploy
  script:
    - apk add --no-cache curl
    - 'curl -X POST -d {} $NETLIFY_BUILD_HOOK'
  only:
    - main
